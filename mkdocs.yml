site_name: Dynantic
site_description: Type-safe DynamoDB ORM with Pydantic validation
site_url: https://simi24.github.io/dynantic
repo_url: https://github.com/Simi24/dynantic
repo_name: Simi24/dynantic

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/dyno.png
  favicon: assets/dyno.png

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google
            show_signature_annotations: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guide:
    - Model Definition: guide/models.md
    - CRUD Operations: guide/crud.md
    - Querying: guide/querying.md
    - Atomic Updates: guide/updates.md
    - Conditional Writes: guide/conditions.md
    - Batch Operations: guide/batch.md
    - Transactions: guide/transactions.md
    - Pagination: guide/pagination.md
    - TTL: guide/ttl.md
    - Auto-UUID: guide/auto-uuid.md
    - Polymorphism: guide/polymorphism.md
  - Integration:
    - FastAPI: integration/fastapi.md
    - Configuration: integration/configuration.md
    - LocalStack Testing: integration/localstack.md
  - API Reference:
    - DynamoModel: reference/model.md
    - Fields: reference/fields.md
    - Conditions: reference/conditions.md
    - QueryBuilder: reference/query.md
    - ScanBuilder: reference/scan.md
    - Updates: reference/updates.md
    - Transactions: reference/transactions.md
    - Batch: reference/batch.md
    - Pagination: reference/pagination.md
    - Client: reference/client.md
    - Exceptions: reference/exceptions.md
  - Comparison: comparison.md
